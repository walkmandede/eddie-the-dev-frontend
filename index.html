<!DOCTYPE html>
<html>
<head>

  <base href="/eddie-the-dev-frontend/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Eddie the Dev Portfolio">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="eddie_the_dev_frontend">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Eddie the Dev</title>
  <link rel="manifest" href="manifest.json">

<style>

#splash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("bg.jpg") center center / cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}

#splash.fade-out {
  opacity: 0;
  visibility: hidden;
}

.loader-container{
  text-align:center;
  color:white;
  font-family: Arial, sans-serif;
}

.spinner {
  width: 60px;
  height: 60px;
  border: 6px solid rgba(255,255,255,0.2);
  border-top: 6px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: auto;
  margin-bottom: 20px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

</style>

</head>

<body>

<div id="splash">
  <div class="loader-container">
    <div class="spinner"></div>
    <p>Preparing Interface...</p>
  </div>
</div>

<script src="flutter_bootstrap.js" async></script>

<script>

window.addEventListener('flutter-first-frame', function () {

  var splash = document.getElementById('splash');

  if (splash) {

    splash.classList.add('fade-out');

    setTimeout(function () {
      splash.remove();
    }, 600);

  }

});

</script>

</body>
</html>
